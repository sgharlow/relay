<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Relay — Narration Teleprompter (synced to relay-demo-silent.mp4)</title>
<style>
  :root { --bg:#070b16; --panel:#0d1526; --line:#1e2b46; --dim:#6b82ab; --text:#eef3ff; --blue:#5b9cff; --teal:#49e0a0; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:Helvetica,Arial,system-ui,sans-serif; }
  .wrap { display:flex; height:100vh; }
  /* LEFT: video */
  .left { width:54%; display:flex; flex-direction:column; background:#000; border-right:1px solid var(--line); }
  video { width:100%; flex:1; min-height:0; background:#000; object-fit:contain; }
  .bar { display:flex; align-items:center; gap:10px; padding:11px 16px; background:var(--panel);
    border-top:1px solid var(--line); font-variant-numeric:tabular-nums; }
  .bar button { background:#16233d; color:var(--text); border:1px solid var(--line); border-radius:7px;
    padding:8px 14px; font-size:14px; cursor:pointer; }
  .bar button:hover { border-color:var(--blue); }
  .bar .clock { font-family:ui-monospace,Consolas,monospace; color:var(--blue); font-size:17px; font-weight:600; }
  .bar .speed { font-family:ui-monospace,Consolas,monospace; color:var(--dim); font-size:13px; }
  .bar .hint { margin-left:auto; color:var(--dim); font-size:11px; max-width:42%; text-align:right; }
  /* RIGHT: script */
  .right { width:46%; overflow-y:auto; padding:40vh 4vw; scroll-behavior:smooth; }
  .seg { border-left:3px solid transparent; padding:14px 22px; margin:10px 0; cursor:pointer;
    color:#4c5e7d; font-size:19px; line-height:1.5; transition:all .18s; }
  .seg .meta { font-family:ui-monospace,Consolas,monospace; font-size:12px; letter-spacing:.12em;
    text-transform:uppercase; color:#3a4a66; margin-bottom:7px; }
  .seg.past { color:#34425e; }
  .seg.next { color:#8fa3c4; }
  .seg.active { color:var(--text); border-left-color:var(--blue); font-size:29px; line-height:1.45;
    background:linear-gradient(90deg, rgba(91,156,255,.10), transparent); }
  .seg.active .meta { color:var(--blue); }
  .seg.active .now { display:inline-block; }
  .now { display:none; color:var(--bg); background:var(--blue); font-weight:700; border-radius:4px;
    padding:1px 8px; margin-left:10px; font-size:13px; letter-spacing:.1em; vertical-align:middle; }
  .cue { color:var(--teal); font-weight:700; }
  .prog { height:3px; background:var(--line); border-radius:2px; margin-top:12px; overflow:hidden; }
  .prog > i { display:block; height:100%; width:0; background:var(--blue); }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <video id="v" src="relay-demo-silent.mp4" preload="auto" muted playsinline></video>
    <div class="bar">
      <button id="play">▶ Play</button>
      <button id="restart">⟲ Restart</button>
      <span class="clock" id="clock">0:00 / 0:00</span>
      <span class="speed" id="speed">1.00×</span>
      <span class="hint">Space play/pause · R restart · [ ] speed · click a line to jump · ←→ seek 5s</span>
    </div>
  </div>
  <div class="right" id="script"></div>
</div>
<script>
// Cue times are on the relay-demo-silent.mp4 timeline (3s intro card, then each beat).
// Read each line as it lights up; default speed is 1.00× so your narration matches the
// final video exactly for a clean audio merge.
const SEGS = [
  { t:3,   label:"0:03 · The problem",
    text:"When someone can't be there - a hospital stay, a trip, or worse - the people who depend on them can't reach the accounts that matter. Relay is standby access for exactly that moment." },
  { t:15,  label:"0:15 · The vault + importance engine",
    text:"You build one encrypted vault - accounts, documents, instructions. Relay's importance engine ranks what matters in a crisis and flags the real risk: your primary email is the key that unlocks most password resets. It only ever sees metadata - never your secrets." },
  { t:29,  label:"0:29 · Access rules",
    text:"You set the rules: who gets which item, and under which trigger - an emergency, a trip, a caregiver, or one day, your estate. Here, the family safe and will goes to Jordan." },
  { t:42,  label:"0:42 · Triggers — ARMED (manual + automatic)",
    text:"Every trigger sits ARMED by default. It can fire two ways - automatically, if you ever stop checking in, or manually when you raise it - and nothing releases until its conditions are actually met." },
  { t:55,  label:"0:55 · Emergency raised → GRACE",
    text:"When an emergency is raised it doesn't just open - it moves into a grace window and waits, because access this sensitive has to be verified." },
  { t:63,  label:"1:03 · A verifier confirms → RELEASED",
    text:"Now real people have to confirm. Relay waits for a quorum of the trusted verifiers you named - not just one - before anything opens. Only then does the release complete, and every transition is a strongly consistent compare-and-set, so it can never double-release." },
  { t:72,  label:"1:12 · The recipient's plan",
    text:"The recipient opens one scoped link and gets a calm, prioritized plan - do this first - showing only what they were granted." },
  { t:81,  label:"1:21 · Reveal",
    text:"They reveal an item and it's decrypted right in their browser - the safe code, where the will is, who the executor is." },
  { t:90,  label:"1:30 · Reversible — access closes",
    text:"And it's reversible. The owner recovers, checks in - and the access closes automatically. The recipient's link goes dead, and everything returns to ARMED." },
  { t:99,  label:"1:39 · Audit log",
    text:"Every step - initiated, verified, released, recovered - is written to an append-only, hash-chained audit log, verified on the server and in the browser." },
  { t:109, label:"1:49 · Aurora DSQL",
    text:"All of it runs on Amazon Aurora DSQL - active-active across regions, strongly consistent. The release is a compare-and-set on DSQL's optimistic concurrency, so even a regional outage can't stop access or corrupt it. And every secret is envelope-encrypted with AWS KMS, so the database only ever holds ciphertext." },
  { t:124, label:"2:04 · Close",
    text:"Relay - standby access for the people who'll need it." },
];

const v = document.getElementById('v');
const script = document.getElementById('script');
const clock = document.getElementById('clock');
const playBtn = document.getElementById('play');
const speedEl = document.getElementById('speed');
const fmt = s => { s=Math.max(0,s|0); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };

const nodes = SEGS.map((seg) => {
  const el = document.createElement('div');
  el.className = 'seg';
  el.innerHTML = `<div class="meta">${seg.label}<span class="now">▶ READ NOW</span></div>`+
                 `<div>${seg.text}</div><div class="prog"><i></i></div>`;
  el.addEventListener('click', () => { v.currentTime = seg.t + 0.05; });
  script.appendChild(el);
  return el;
});

let activeIdx = -1;
function render() {
  const ct = v.currentTime;
  let idx = -1;
  for (let i=0;i<SEGS.length;i++){ if (ct >= SEGS[i].t - 0.001) idx = i; else break; }
  const next = SEGS[idx+1];
  SEGS.forEach((seg,i) => {
    const el = nodes[i];
    el.classList.toggle('active', i===idx);
    el.classList.toggle('past', i<idx);
    el.classList.toggle('next', i===idx+1);
    const meta = el.querySelector('.meta');
    meta.querySelector('.cue')?.remove();
    if (i===idx+1 && next) { const dt = Math.ceil(next.t - ct); if (dt<=8) meta.insertAdjacentHTML('beforeend', ` <span class="cue">— in ${dt}s</span>`); }
    if (i===idx) {
      const end = (i+1<SEGS.length)? SEGS[i+1].t : (v.duration||108);
      const pct = Math.min(100, Math.max(0, (ct - seg.t)/(end - seg.t)*100));
      el.querySelector('.prog > i').style.width = pct+'%';
    }
  });
  if (idx !== activeIdx && idx>=0) { activeIdx=idx; nodes[idx].scrollIntoView({block:'center'}); }
  clock.textContent = fmt(ct)+' / '+fmt(v.duration||0);
}

let SPEED = 1.00;
function applySpeed(){ SPEED = Math.min(2, Math.max(0.5, Math.round(SPEED*100)/100)); v.playbackRate = SPEED; speedEl.textContent = SPEED.toFixed(2)+'×'; }
v.addEventListener('loadedmetadata', applySpeed);
v.addEventListener('timeupdate', render);
v.addEventListener('play',  () => playBtn.textContent='❚❚ Pause');
v.addEventListener('pause', () => playBtn.textContent='▶ Play');
setInterval(render, 100); // keeps the countdown live while paused/seeking

playBtn.onclick = () => { v.paused ? v.play() : v.pause(); };
document.getElementById('restart').onclick = () => { v.currentTime = 0; v.pause(); };
document.addEventListener('keydown', e => {
  if (e.code==='Space'){ e.preventDefault(); v.paused ? v.play() : v.pause(); }
  else if (e.key==='r'||e.key==='R'){ v.currentTime=0; v.pause(); }
  else if (e.key==='['){ SPEED-=0.05; applySpeed(); }
  else if (e.key===']'){ SPEED+=0.05; applySpeed(); }
  else if (e.key==='ArrowLeft'){ v.currentTime=Math.max(0,v.currentTime-5); }
  else if (e.key==='ArrowRight'){ v.currentTime=Math.min(v.duration||108,v.currentTime+5); }
});
render();
</script>
</body>
</html>
