<svg viewBox="0 0 1080 700" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748B"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0D9488"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="700" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="46" font-size="25" font-weight="700" fill="#0F172A">Relay — System Architecture</text>
  <text x="40" y="70" font-size="13" fill="#475569">Next.js on Vercel · Amazon Aurora DSQL (multi-region, active-active) · client-side encryption</text>

  <!-- ===================== CLIENT TRUST BOUNDARY ===================== -->
  <rect x="40" y="120" width="270" height="358" rx="12" fill="#EEF0FE" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="54" y="144" font-size="11" font-weight="700" fill="#4338CA" letter-spacing="0.5">ZERO-KNOWLEDGE BOUNDARY</text>
  <text x="54" y="160" font-size="10.5" fill="#6366F1">plaintext never leaves the client</text>

  <rect x="58" y="176" width="234" height="44" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.2"/>
  <text x="175" y="203" font-size="13" fill="#0F172A" text-anchor="middle">Owner — browser (Next.js)</text>

  <rect x="58" y="230" width="234" height="44" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.2"/>
  <text x="175" y="257" font-size="13" fill="#0F172A" text-anchor="middle">Recipient — browser (Next.js)</text>

  <rect x="58" y="292" width="234" height="170" rx="8" fill="#F5F3FF" stroke="#6366F1" stroke-width="1.2"/>
  <text x="70" y="314" font-size="12" font-weight="700" fill="#4338CA">Client-side runtime</text>
  <text x="70" y="338" font-size="11" fill="#334155">• Envelope-encrypt every item (AES-GCM)</text>
  <text x="70" y="360" font-size="11" fill="#334155">• Parse CSV / password-manager import</text>
  <text x="70" y="382" font-size="11" fill="#334155">• Derive non-secret ranking metadata</text>
  <text x="70" y="404" font-size="11" fill="#334155">• Upload only ciphertext + metadata</text>

  <!-- ===================== VERCEL EDGE ===================== -->
  <rect x="395" y="300" width="185" height="92" rx="10" fill="#0F172A"/>
  <text x="487" y="338" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Vercel Edge</text>
  <text x="487" y="360" font-size="11" fill="#CBD5E1" text-anchor="middle">Next.js route handlers</text>
  <text x="487" y="376" font-size="10" fill="#94A3B8" text-anchor="middle">(the API tier)</text>

  <!-- ===================== AWS ZONE ===================== -->
  <rect x="650" y="120" width="410" height="525" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="668" y="144" font-size="13" font-weight="700" fill="#64748B" letter-spacing="1">AWS</text>

  <!-- KMS -->
  <rect x="678" y="156" width="180" height="58" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="768" y="182" font-size="13" font-weight="700" fill="#6D28D9" text-anchor="middle">AWS KMS</text>
  <text x="768" y="200" font-size="10.5" fill="#475569" text-anchor="middle">wrap / unwrap data keys</text>

  <!-- DSQL -->
  <rect x="678" y="246" width="360" height="188" rx="10" fill="#FFFFFF" stroke="#1E40AF" stroke-width="1.6"/>
  <path d="M688 246 h340 a10 10 0 0 1 10 10 v34 h-360 v-34 a10 10 0 0 1 10 -10 z" fill="#1E40AF"/>
  <text x="858" y="269" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Amazon Aurora DSQL</text>
  <text x="858" y="285" font-size="9.5" fill="#BFDBFE" text-anchor="middle">Region A  ⇄  Region B · active-active · strong consistency</text>

  <!-- secrets compartment -->
  <rect x="690" y="300" width="336" height="42" rx="6" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <rect x="701" y="316" width="12" height="9" rx="2" fill="#4338CA"/>
  <path d="M703 316 v-3 a4 4 0 0 1 8 0 v3" fill="none" stroke="#4338CA" stroke-width="1.5"/>
  <text x="722" y="326" font-size="10.5" fill="#312E81">Encrypted secrets — ciphertext + wrapped data keys</text>

  <!-- metadata compartment -->
  <rect x="690" y="350" width="336" height="72" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="700" y="370" font-size="11" font-weight="700" fill="#047857">Non-secret metadata</text>
  <text x="700" y="388" font-size="9.5" fill="#065F46">category · is_root_credential · recurring_billing</text>
  <text x="700" y="403" font-size="9.5" fill="#065F46">importance_score · risk-graph edges · release_state</text>

  <text x="678" y="450" font-size="9.5" font-style="italic" fill="#475569">OCC compare-and-set on release_state</text>

  <!-- Importance engine -->
  <rect x="678" y="460" width="180" height="74" rx="8" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.4"/>
  <text x="768" y="482" font-size="12.5" font-weight="700" fill="#0F766E" text-anchor="middle">Importance engine</text>
  <text x="768" y="499" font-size="10" fill="#475569" text-anchor="middle">classify · score · triage</text>
  <text x="768" y="515" font-size="9.5" fill="#0D9488" text-anchor="middle">(serverless · metadata only)</text>

  <!-- Scheduler -->
  <rect x="880" y="460" width="158" height="74" rx="8" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="959" y="482" font-size="12.5" font-weight="700" fill="#334155" text-anchor="middle">Scheduler</text>
  <text x="959" y="499" font-size="10" fill="#475569" text-anchor="middle">Cron / EventBridge</text>
  <text x="959" y="515" font-size="9.5" fill="#64748B" text-anchor="middle">heartbeat eval</text>

  <!-- Notifications -->
  <rect x="678" y="556" width="180" height="58" rx="8" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="768" y="582" font-size="12.5" font-weight="700" fill="#334155" text-anchor="middle">Notifications</text>
  <text x="768" y="599" font-size="10" fill="#475569" text-anchor="middle">email / SMS</text>

  <!-- ===================== ARROWS ===================== -->
  <!-- client -> vercel -->
  <line x1="310" y1="346" x2="392" y2="346" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="351" y="338" font-size="9.5" fill="#475569" text-anchor="middle">TLS · ciphertext + metadata</text>

  <!-- vercel -> KMS -->
  <line x1="572" y1="320" x2="680" y2="198" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="600" y="252" font-size="9.5" fill="#6D28D9">wrap / unwrap</text>

  <!-- vercel -> DSQL -->
  <line x1="580" y1="358" x2="676" y2="330" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="600" y="345" font-size="9.5" fill="#1E40AF">SQL · OCC commits</text>

  <!-- vercel -> importance engine -->
  <line x1="520" y1="390" x2="676" y2="488" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="560" y="455" font-size="9.5" fill="#0F766E">invoke</text>

  <!-- importance -> DSQL metadata (teal, metadata only) -->
  <line x1="768" y1="460" x2="768" y2="425" stroke="#0D9488" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrowTeal)"/>

  <!-- scheduler -> DSQL -->
  <line x1="957" y1="460" x2="957" y2="436" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="965" y="452" font-size="9" fill="#64748B">heartbeat</text>

  <!-- vercel -> notifications (L path) -->
  <path d="M430 392 V 585 H 676" fill="none" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="470" y="578" font-size="9.5" fill="#475569">alerts / nudges</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="40" y="496" width="270" height="174" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
  <text x="54" y="518" font-size="11" font-weight="700" fill="#334155">Legend</text>

  <line x1="54" y1="535" x2="80" y2="535" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="88" y="539" font-size="10" fill="#475569">Zero-knowledge boundary</text>

  <rect x="54" y="550" width="24" height="13" rx="3" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="88" y="560" font-size="10" fill="#475569">Non-secret metadata (used for ranking)</text>

  <rect x="54" y="571" width="24" height="13" rx="3" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="88" y="581" font-size="10" fill="#475569">Encrypted secrets — unreadable server-side</text>

  <line x1="54" y1="600" x2="80" y2="600" stroke="#0D9488" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="88" y="604" font-size="10" fill="#0D9488">Importance engine reads metadata only —</text>
  <text x="88" y="618" font-size="10" fill="#0D9488">never the encrypted secrets</text>

  <text x="54" y="642" font-size="9.5" font-style="italic" fill="#1E40AF">Failover: disable Region A → Region B serves,</text>
  <text x="54" y="656" font-size="9.5" font-style="italic" fill="#1E40AF">strongly consistent, no interruption.</text>
</svg>
